services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement-portal-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "5000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      MONGO_URI: "${MONGO_URI:?MONGO_URI is required}"
      CLOUD_NAME: "${CLOUD_NAME:?CLOUD_NAME is required}"
      CLOUD_API_KEY: "${CLOUD_API_KEY:?CLOUD_API_KEY is required}"
      CLOUD_API_SECRET: "${CLOUD_API_SECRET:?CLOUD_API_SECRET is required}"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: placement-portal-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:5000/api/v1}"
    depends_on:
      - backend
    restart: unless-stopped
