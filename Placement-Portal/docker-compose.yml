version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement-portal-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "5000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      MONGO_URI: "${MONGO_URI:?MONGO_URI is required}"
      CLOUD_NAME: "${CLOUD_NAME:?CLOUD_NAME is required}"
      CLOUD_API_KEY: "${CLOUD_API_KEY:?CLOUD_API_KEY is required}"
      CLOUD_API_SECRET: "${CLOUD_API_SECRET:?CLOUD_API_SECRET is required}"
      GROQ_API_KEY: "${GROQ_API_KEY:?GROQ_API_KEY is required}"
    restart: always

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: placement-portal-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: always
